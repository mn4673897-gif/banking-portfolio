<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroTech | Professional Tech Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #004aad;
            --accent-gold: #ffbd59;
        }

        .hero {
            background: #f8f9fa;
            padding: 60px 0;
            border-bottom: 5px solid var(--primary-blue);
        }

        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">ELECTROTECH</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#book">Book Service</a>
                <a class="nav-link" href="#installments">Installment Plans</a>
            </div>
        </div>
    </nav>

    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Tech Trouble? We’ll Come to You.</h1>
            <p class="lead">Expert repairs and smart sensor setups with flexible payment plans.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-6" id="book">
                <div class="card shadow p-4">
                    <h3>Schedule a Repair</h3>
                    <form id="bookingForm">
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" id="userName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Issue Description</label>
                            <textarea id="issue" class="form-control" rows="3"
                                placeholder="e.g. Broken sensor, wiring issue..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Preferred Date</label>
                            <input type="date" id="bookDate" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Confirm Booking</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6" id="installments">
                <div class="card shadow p-4 border-warning">
                    <h3>Installment Calculator</h3>
                    <p class="text-muted">For Smart Sensor & Tech Setups</p>
                    <div class="mb-3">
                        <label>Package Price (₱)</label>
                        <input type="number" id="totalPrice" class="form-control" placeholder="Enter amount">
                    </div>
                    <div class="mb-3">
                        <label>Months to Pay</label>
                        <select id="months" class="form-select">
                            <option value="3">3 Months</option>
                            <option value="6">6 Months</option>
                            <option value="12">12 Months</option>
                        </select>
                    </div>
                    <button onclick="calculateInstallment()" class="btn btn-outline-dark w-100">Calculate Monthly
                        Payment</button>
                    <div id="calcResult" class="mt-3 fw-bold text-success text-center"></div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h3>Active Service Requests (Backend Demo)</h3>
                <table class="table table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Client</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="dbTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
